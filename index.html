<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NameForge – Gerador de Nomes / Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ADSENSE: substitua pelo seu código real -->

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --accent: #e8c77a;
      --accent2: #c4a45a;
      --text: #f0ede6;
      --muted: #888;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,199,122,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 90%, rgba(196,164,90,.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LANGUAGE POPUP ── */
    #lang-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #lang-box {
      background: var(--surface);
      border: 1px solid rgba(232,199,122,.25);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(.88) translateY(20px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    #lang-box .globe {
      font-size: 44px;
      margin-bottom: 16px;
    }

    #lang-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 8px;
    }

    #lang-box p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .lang-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1.5px solid rgba(232,199,122,.2);
      color: var(--text);
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      transition: all .25s;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      background: rgba(232,199,122,.1);
      transform: translateY(-2px);
    }

    .lang-btn .flag { font-size: 1.4rem; }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 32px 24px 0;
      text-align: center;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    header h1 span { color: var(--accent); }

    header p.tagline {
      color: var(--muted);
      margin-top: 10px;
      font-size: .95rem;
      font-weight: 300;
    }

    /* ── AD SLOT TOP ── */
    .ad-slot {
      position: relative;
      z-index: 1;
      margin: 24px auto;
      max-width: 728px;
      width: 90%;
      min-height: 90px;
      background: var(--surface);
      border: 1px dashed rgba(255,255,255,.08);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .75rem;
    }

    /* ── MAIN CARD ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 20px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--surface2);
      padding: 6px;
      border-radius: 50px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      transition: all .2s;
    }

    .tab.active {
      background: var(--accent);
      color: #0d0d0f;
    }

    /* ── CONTROLS ── */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .control-group label {
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    select, input[type="number"] {
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,.08);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      width: 100%;
      appearance: none;
      outline: none;
      transition: border-color .2s;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    .row { display: flex; gap: 16px; }
    .row .control-group { flex: 1; }

    /* ── GENERATE BUTTON ── */
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 50px;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      letter-spacing: .02em;
    }

    .btn-generate:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,199,122,.25);
    }

    .btn-generate:active { transform: translateY(0); }

    /* ── RESULTS ── */
    .results {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .name-chip {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }

    .name-chip:hover {
      border-color: var(--accent);
      background: rgba(232,199,122,.08);
    }

    .name-chip::after {
      content: '📋';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: .75rem;
      opacity: 0;
      transition: opacity .2s;
    }

    .name-chip:hover::after { opacity: 1; }

    .copy-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #0d0d0f;
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: .9rem;
      opacity: 0;
      transition: all .3s;
      z-index: 100;
      pointer-events: none;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── AD SLOT MID ── */

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      padding: 0 20px 40px;
    }

    @media (max-width: 500px) {
      .card { padding: 24px 18px; }
      .row { flex-direction: column; }
    }
  </style>
</head>

      </div>
      <div class="control-group">
        <label id="lbl-qty">Quantidade</label>
        <input type="number" id="baby-qty" value="8" min="1" max="20" />
      </div>
    </div>

    <div id="panel-char" style="display:none">
      <div class="row">
        <div class="control-group">

            <option value="dark">Dark / Gótico</option>
            <option value="modern">Moderno / Urbano</option>

        </div>
        <div class="control-group">
          <label id="lbl-gender2">Gênero</label>

            <option value="m">Masculino</option>

        </div>
      </div>
      <div class="control-group">
        <label id="lbl-qty2">Quantidade</label>
        <input type="number" id="char-qty" value="8" min="1" max="20" />

    </div>

      <div class="row">
        <div class="control-group">
          <label id="lbl-sector">Setor</label>

            <option value="tech">Tech / Startup</option>
            <option value="food">Alimentação / Food</option>
            <option value="fashion">Moda / Fashion</option>
            <option value="health">Saúde / Bem-estar</option>
            <option value="finance">Finanças / Negócios</option>

        <div class="control-group">

            <option value="classic">Clássico / Formal</option>
            <option value="playful">Divertido / Jovem</option>
          </select>
        </div>
      </div>
      <div class="control-group">
        <label id="lbl-qty3">Quantidade</label>
        <input type="number" id="biz-qty" value="8" min="1" max="20" />

  // ── STATE ──
  let currentTab = 'baby';

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-baby').style.display = tab === 'baby' ? 'block' : 'none';
    document.getElementById('panel-char').style.display = tab === 'char' ? 'block' : 'none';
    document.getElementById('panel-biz').style.display  = tab === 'biz'  ? 'block' : 'none';
    document.getElementById('results').innerHTML = '';
  }

  function pick(arr, n) {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, Math.min(n, shuffled.length));
  }

  function generate() {
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    let names = [];

    if (currentTab === 'baby') {
      const gender = document.getElementById('baby-gender').value;
      const origin = document.getElementById('baby-origin').value;
      const qty    = parseInt(document.getElementById('baby-qty').value);
      const pool   = NAMES.baby[gender][origin] || [];
      names = pick(pool, qty);
    }

    if (currentTab === 'char') {
      const universe = document.getElementById('char-universe').value;
      const gender   = document.getElementById('char-gender').value;
      const qty      = parseInt(document.getElementById('char-qty').value);
      const pool     = (NAMES.char[universe] || {})[gender] || NAMES.char[universe]?.n || [];
      names = pick(pool, qty);
    }

    if (currentTab === 'biz') {
      const sector = document.getElementById('biz-sector').value;
      const style  = document.getElementById('biz-style').value;
      const qty    = parseInt(document.getElementById('biz-qty').value);
      const pool   = (NAMES.biz[sector] || {})[style] || [];
      names = pick(pool, qty);
    }

    names.forEach((name, i) => {
      const chip = document.createElement('div');
      chip.className = 'name-chip';
      chip.textContent = name;
      chip.style.animationDelay = `${i * 0.05}s`;
      chip.style.animation = 'fadeUp .35s ease both';
      chip.onclick = () => copyName(name);
      resultsEl.appendChild(chip);
    });
  }

  function copyName(name) {
    navigator.clipboard.writeText(name).catch(() => {});
    const toast = document.getElementById('toast');
    toast.textContent = T[lang].copied + ' ' + name;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── CSS ANIMATION ──
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
  `;
  document.head.appendChild(style);
</script>
