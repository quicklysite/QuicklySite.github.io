<!DOCTYPE html>
<html lang="pt">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3FEPS5KJLN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3FEPS5KJLN');
  </script>
  <meta name="google-site-verification" content="J598geleuRAfDioJqAjsRrwJafNAv85DJRXaYhJwQFU" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NameForge – Gerador de Nomes / Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8800851624013593" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --accent: #e8c77a;
      --text: #f0ede6;
      --muted: #888;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    header { padding: 32px 24px; text-align: center; }
    header h1 span { color: var(--accent); }
    main { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
    .card { background: var(--surface); border: 1px solid rgba(255,255,255,.07); border-radius: 20px; padding: 36px; margin-bottom: 20px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; background: var(--surface2); padding: 6px; border-radius: 50px; }
    .tab { flex: 1; padding: 10px 0; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 50px; font-weight: 500; }
    .tab.active { background: var(--accent); color: #0d0d0f; }
    .control-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    select, input { background: var(--surface2); border: 1.5px solid rgba(255,255,255,.08); color: var(--text); padding: 12px; border-radius: 10px; width: 100%; }
    .btn-generate { width: 100%; padding: 16px; background: var(--accent); color: #0d0d0f; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }
    .results { margin-top: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .name-chip { background: var(--surface2); padding: 14px; border-radius: 10px; text-align: center; cursor: pointer; }
    footer { text-align: center; padding: 40px 20px; border-top: 1px solid #1e1e24; color: var(--muted); font-size: 14px; }
    footer a { color: var(--accent); text-decoration: none; margin: 0 10px; }
    .conv-section { display: none; }
    .conv-active { display: block; }
    #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1001; background: var(--surface); border: 1px solid var(--accent); color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    #sidebar { position: fixed; top: 0; left: 0; width: 250px; height: 100%; background: var(--surface); z-index: 1000; transform: translateX(-100%); transition: 0.3s; padding-top: 60px; }
    #sidebar.open { transform: translateX(0); }
    .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-item:hover { color: var(--accent); }
  </style>
</head>
<body>

<button id="menu-btn" onclick="toggleSidebar()">☰</button>
<nav id="sidebar">
  <div class="nav-item" onclick="showConv('names')">✨ Gerador de Nomes</div>
  <div class="nav-item" onclick="showConv('weight')">⚖️ Peso</div>
  <div class="nav-item" onclick="showConv('temp')">🌡️ Temperatura</div>
  <div class="nav-item" onclick="showConv('kitchen')">🍳 Cozinha</div>
</nav>

<header>
  <h1><span>Name</span>Forge</h1>
  <p id="tagline">Gerador de nomes para bebês, personagens e empresas</p>
</header>

<main>
  <div class="card" id="main-card">
    <div class="tabs">
      <button class="tab active" onclick="setTab('baby', this)">👶 Bebê</button>
      <button class="tab" onclick="setTab('char', this)">⚔️ Personagem</button>
      <button class="tab" onclick="setTab('biz', this)">🏢 Empresa</button>
    </div>
    <div id="panel-baby">
      <div class="control-group"><label>Gênero</label><select id="baby-gender"><option value="f">Feminino</option><option value="m">Masculino</option></select></div>
      <div class="control-group"><label>Quantidade</label><input type="number" id="baby-qty" value="8"></div>
    </div>
    <button class="btn-generate" onclick="generate()">✨ Gerar Nomes</button>
    <div class="results" id="results"></div>
  </div>

  <div id="conv-weight" class="conv-section card">
    <h2 style="color:var(--accent); margin-bottom:15px;">⚖️ Conversor de Peso</h2>
    <input type="number" id="w-val" value="1" oninput="runWeight()" placeholder="Valor">
    <div style="display:flex; gap:10px; margin-top:10px;">
      <select id="w-from" onchange="runWeight()"><option value="kg">Kg</option><option value="lb">Libras</option></select>
      <select id="w-to" onchange="runWeight()"><option value="lb">Libras</option><option value="kg">Kg</option></select>
    </div>
    <div id="w-res" style="font-size:24px; text-align:center; margin-top:20px; color:var(--accent);">2.20 lb</div>
  </div>
</main>

<footer>
  <p>&copy; 2026 NameForge</p>
  <div style="margin-top:15px;">
    <a href="about.html">Sobre</a> | 
    <a href="privacy.html">Política de Privacidade</a> | 
    <a href="terms.html">Termos de Uso</a>
  </div>
  <div style="margin-top:20px;">
    <a href="#"><img src="https://contador-gratis.com/contadores-de-visitas/050526062556736.gif" alt="Contador"></a>
  </div>
</footer>

<script>
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
  
  function showConv(id) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('main-card').style.display = id === 'names' ? 'block' : 'none';
    document.querySelectorAll('.conv-section').forEach(s => s.style.display = 'none');
    if(id !== 'names') document.getElementById('conv-' + id).style.display = 'block';
  }

  function runWeight() {
    let v = parseFloat(document.getElementById('w-val').value) || 0;
    let f = document.getElementById('w-from').value;
    let t = document.getElementById('w-to').value;
    let res = (f === 'kg' && t === 'lb') ? v * 2.20462 : (f === 'lb' && t === 'kg') ? v / 2.20462 : v;
    document.getElementById('w-res').innerText = res.toFixed(2) + " " + t;
  }

  function generate() {
    const res = document.getElementById('results');
    res.innerHTML = '<div class="name-chip">Exemplo de Nome</div>';
  }
</script>
</body>
</html>
