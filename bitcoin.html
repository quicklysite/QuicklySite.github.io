<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotação Bitcoin & Ethereum em Tempo Real – NameForge</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3FEPS5KJLN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3FEPS5KJLN');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8800851624013593" crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --surface2: #1e1e24;
            --accent: #e8c77a;
            --text: #f0f0f2;
            --text-dim: #a1a1a6;
            --up: #4cd964;
            --down: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 2.2rem; margin-bottom: 10px; }
        
        .btn-back {
            background: none; border: 1px solid var(--surface2); color: var(--accent);
            padding: 8px 16px; cursor: pointer; border-radius: 8px; text-decoration: none;
            display: inline-block; margin-bottom: 20px; font-size: 0.9rem; transition: 0.3s;
        }
        .btn-back:hover { background: var(--surface2); }

        .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    margin-bottom: 40px;
}

.card {
    background: var(--surface);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid var(--surface2);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* Dá profundidade ao quadro */
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
}

.card h2 { 
    font-size: 1rem; 
    color: var(--accent); 
    text-transform: uppercase; 
    letter-spacing: 2px;
    margin-bottom: 20px; 
}

.price { 
    font-size: 2.2rem; 
    font-weight: 700; 
    color: var(--text); 
    display: block; 
    margin-bottom: 10px; 
}


        /* Calculadora Estilo Google Tradutor */
        .calc-container {
            background: var(--surface); padding: 25px; border-radius: 16px;
            border: 1px solid var(--surface2); margin-bottom: 30px;
        }
        .calc-row { display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .calc-box { flex: 1; background: var(--surface2); padding: 15px; border-radius: 12px; }
        .calc-box label { display: block; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        .calc-box input {
            width: 100%; background: transparent; border: none; color: var(--text);
            font-size: 1.3rem; font-weight: 700; outline: none;
        }
        .calc-box select {
            background: transparent; border: none; color: var(--text-dim);
            font-size: 0.85rem; cursor: pointer; outline: none; margin-top: 5px;
        }

        .swap-btn {
            background: var(--surface2); border: 1px solid var(--surface2);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .swap-btn:hover { border-color: var(--accent); transform: scale(1.1); }
        .swap-btn svg { width: 20px; fill: var(--accent); }

        /* Explicações Acordeão */
        .info-item {
            background: var(--surface); border-radius: 12px; margin-bottom: 12px;
            border: 1px solid var(--surface2); overflow: hidden;
        }
        .info-trigger {
            width: 100%; padding: 18px; background: none; border: none;
            color: var(--text); display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-weight: 500; font-size: 1rem;
        }
        .info-content {
            padding: 0 18px; max-height: 0; overflow: hidden;
            transition: 0.3s ease-out; color: var(--text-dim); font-size: 0.95rem; line-height: 1.6;
        }
        .info-item.open .info-content { padding: 0 18px 18px 18px; max-height: 300px; }
        .arrow { transition: 0.3s; fill: var(--accent); width: 15px; }
        .info-item.open .arrow { transform: rotate(180deg); }

        #status { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-top: 20px; }

        @media (max-width: 600px) {
            .calc-row { flex-direction: column; }
            .swap-btn { transform: rotate(90deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" id="link-back" class="btn-back">← Voltar</a>
     <div class="price-grid">
    <div class="card">
        <h2 id="txt-btc-card">Bitcoin (BTC)</h2>
        <span class="price" id="btc-price">...</span>
        <div id="btc-change" style="font-weight: 500; font-size: 1.1rem;">--</div>
    </div>

    <div class="card">
        <h2 id="txt-eth-card">Ethereum (ETH)</h2>
        <span class="price" id="eth-price">...</span>
        <div id="eth-change" style="font-weight: 500; font-size: 1.1rem;">--</div>
    </div>
</div>

    <header>
        <h1 id="txt-title">Cotação Cripto</h1>
    </header>

    <div class="price-grid">
        <div class="card">
            <h2 id="txt-btc-card">Bitcoin (BTC)</h2>
            <span class="price" id="btc-price">...</span>
            <div id="btc-change">--</div>
        </div>
        <div class="card">
            <h2 id="txt-eth-card">Ethereum (ETH)</h2>
            <span class="price" id="eth-price">...</span>
            <div id="eth-change">--</div>
        </div>
    </div>

    <div class="calc-container">
        <div class="calc-row" id="calc-layout">
            <div class="calc-box">
                <label id="lbl-qty">Quantidade</label>
                <input type="number" id="input-qty" value="1" oninput="updateCalc()">
                <select id="select-coin" onchange="updateCalc()">
                    <option value="btc">Bitcoin (BTC)</option>
                    <option value="eth">Ethereum (ETH)</option>
                </select>
            </div>

            <button class="swap-btn" onclick="swapCalc()">
                <svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>
            </button>

            <div class="calc-box">
                <label id="lbl-res">Resultado</label>
                <input type="text" id="output-val" readonly>
                <select id="select-fiat" onchange="updateCalc()">
                    <option value="brl">Real (BRL)</option>
                    <option value="usd">Dólar (USD)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="info-item" onclick="this.classList.toggle('open')">
        <button class="info-trigger">
            <span id="q-btc">O que é o Bitcoin?</span>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
        <div class="info-content" id="a-btc">...</div>
    </div>

    <div class="info-item" onclick="this.classList.toggle('open')">
        <button class="info-trigger">
            <span id="q-eth">O que é o Ethereum?</span>
            <svg class="arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
        <div class="info-content" id="a-eth">...</div>
    </div>

    <p id="status">...</p>
</div>

<script>
// DICIONÁRIO DE TRADUÇÃO (MESMO PADRÃO DO INDEX)
const T = {
    pt: {
        title: "Cotação Cripto",
        back: "Voltar",
        qty: "Quantidade",
        res: "Resultado",
        qBtc: "O que é o Bitcoin?",
        aBtc: "O Bitcoin é uma moeda digital descentralizada lançada em 2009. Funciona através da tecnologia Blockchain, permitindo transações seguras e diretas (P2P) sem a necessidade de bancos ou intermediários. É limitado a 21 milhões de unidades.",
        qEth: "O que é o Ethereum?",
        aEth: "O Ethereum é muito mais que uma moeda; é uma rede blockchain que permite a criação de 'Contratos Inteligentes' e aplicativos descentralizados. Sua moeda nativa, o Ether (ETH), alimenta toda essa plataforma global.",
        status: "Atualizado: "
    },
    en: {
        title: "Crypto Rates",
        back: "Back",
        qty: "Amount",
        res: "Result",
        qBtc: "What is Bitcoin?",
        aBtc: "Bitcoin is a decentralized digital currency launched in 2009. It operates through Blockchain technology, allowing secure and direct (P2P) transactions without the need for banks or intermediaries. It is limited to 21 million units.",
        qEth: "What is Ethereum?",
        aEth: "Ethereum is much more than a currency; it is a blockchain network that enables 'Smart Contracts' and decentralized applications. Its native currency, Ether (ETH), powers this global platform.",
        status: "Updated: "
    }
};

let prices = { btc: { brl: 0, usd: 0 }, eth: { brl: 0, usd: 0 } };
let currentLang = 'pt';

// LÓGICA DE LINGUAGEM VIA URL (PADRÃO CONVERSOR ROUPAS)
const urlP = new URLSearchParams(window.location.search);
currentLang = urlP.get('lang') || 'pt';

function init() {
    const t = T[currentLang];
    document.getElementById('txt-title').textContent = t.title;
    document.getElementById('link-back').innerHTML = `← ${t.back}`;
    document.getElementById('link-back').href = `index.html?lang=${currentLang}`; // Mantém idioma ao voltar
    document.getElementById('lbl-qty').textContent = t.qty;
    document.getElementById('lbl-res').textContent = t.res;
    document.getElementById('q-btc').textContent = t.qBtc;
    document.getElementById('a-btc').textContent = t.aBtc;
    document.getElementById('q-eth').textContent = t.qEth;
    document.getElementById('a-eth').textContent = t.aEth;
    document.documentElement.lang = currentLang;
    
    fetchPrices();
}

async function fetchPrices() {
    try {
        // API CoinGecko para dados reais
        const res = await fetch('https://api.coingecko.com/api/v2/simple/price?ids=bitcoin,ethereum&vs_currencies=brl,usd&include_24hr_change=true');
        const data = await res.json();
        
        prices.btc = { brl: data.bitcoin.brl, usd: data.bitcoin.usd, ch: data.bitcoin.brl_24h_change };
        prices.eth = { brl: data.ethereum.brl, usd: data.ethereum.usd, ch: data.ethereum.brl_24h_change };

        updateUI();
    } catch(e) {
        document.getElementById('status').textContent = currentLang === 'pt' ? "Erro na atualização." : "Update error.";
    }
}

function updateUI() {
    const btc = prices.btc;
    const eth = prices.eth;

    // Preenche o preço grande no meio do quadro
    document.getElementById('btc-price').textContent = currentLang === 'pt' ? `R$ ${btc.brl.toLocaleString('pt-BR')}` : `$ ${btc.usd.toLocaleString('en-US')}`;
    document.getElementById('eth-price').textContent = currentLang === 'pt' ? `R$ ${eth.brl.toLocaleString('pt-BR')}` : `$ ${eth.usd.toLocaleString('en-US')}`;

    const b1 = btc.ch >= 0 ? '#4cd964' : '#ff3b30';
    const e1 = eth.ch >= 0 ? '#4cd964' : '#ff3b30';

    // Preenche a porcentagem no rodapé do quadro
    document.getElementById('btc-change').innerHTML = `<span style="color:${b1}">${btc.ch >= 0 ? '▲' : '▼'} ${btc.ch.toFixed(2)}% (24h)</span>`;
    document.getElementById('eth-change').innerHTML = `<span style="color:${e1}">${eth.ch >= 0 ? '▲' : '▼'} ${eth.ch.toFixed(2)}% (24h)</span>`;
    
    document.getElementById('status').textContent = T[currentLang].status + new Date().toLocaleTimeString();
    updateCalc();
}


function updateCalc() {
    const qty = parseFloat(document.getElementById('input-qty').value) || 0;
    const coin = document.getElementById('select-coin').value;
    const fiat = document.getElementById('select-fiat').value;
    
    const res = qty * prices[coin][fiat];
    document.getElementById('output-val').value = res.toLocaleString(currentLang === 'pt' ? 'pt-BR' : 'en-US', {
        style: 'currency', currency: fiat.toUpperCase()
    });
}

function swapCalc() {
    const layout = document.getElementById('calc-layout');
    layout.style.flexDirection = layout.style.flexDirection === 'row-reverse' ? 'row' : 'row-reverse';
}

init();
// ATUALIZAÇÃO AUTOMÁTICA EM TEMPO REAL (60 SEGUNDOS)
setInterval(fetchPrices, 60000);
</script>

</body>
</html>
